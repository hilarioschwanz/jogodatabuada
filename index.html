<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏆 Desafio da Tabuada - Modo Competitivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #5f27cd 0%, #341f97 100%);
            padding: 20px;
            color: white;
        }

        .lives {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
            font-size: 32px;
        }

        .level-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            font-size: 14px;
        }

        .question-area {
            padding: 40px 20px;
            text-align: center;
        }

        .question {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
        }

        .input-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        #answer {
            padding: 15px 20px;
            font-size: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            width: 150px;
            text-align: center;
            font-weight: 600;
        }

        #answer:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .timer-bar-container {
            background: #e0e0e0;
            height: 12px;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00b09b, #96c93d);
            transition: width 0.1s linear;
        }

        .timer-bar.warning {
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        .ranking {
            background: #f8f9fa;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            max-height: 400px;
            overflow-y: auto;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .ranking-table th {
            background: #667eea;
            color: white;
        }

        .first-place {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            font-weight: 800;
        }

        .login-screen, .game-over {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        .error-message {
            color: #f5576c;
            font-size: 14px;
            margin-top: 5px;
        }

        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        @media (max-width: 600px) {
            .question { font-size: 36px; }
            button { padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <div id="loginScreen" class="login-screen">
            <div class="header">
                <h2>🏆 Desafio da Tabuada</h2>
                <p>Modo Competitivo</p>
            </div>
            <div style="padding: 20px;">
                <div class="form-group">
                    <label>📚 Selecione a Turma</label>
                    <select id="turma">
                        <option value="6º Ano A">6º Ano A</option>
                        <option value="6º Ano B">6º Ano B</option>
                        <option value="7º Ano A">7º Ano A</option>
                        <option value="7º Ano B">7º Ano B</option>
                        <option value="8º Ano A">8º Ano A</option>
                        <option value="8º Ano B">8º Ano B</option>
                        <option value="9º Ano A">9º Ano A</option>
                        <option value="9º Ano B">9º Ano B</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔑 Código de Acesso (ex: CA6A2601)</label>
                    <input type="text" id="codigoAcesso" placeholder="CA6A2601" maxlength="10">
                    <div class="error-message" id="loginError"></div>
                </div>
                <button onclick="login()">🎮 Iniciar Jogo</button>
            </div>
        </div>

        <div id="gameScreen" class="hidden">
            <div class="header">
                <div style="display: flex; justify-content: space-between;">
                    <span class="level-badge" id="levelDisplay">Nível 1</span>
                    <span class="level-badge" id="codigoDisplay"></span>
                </div>
                <div class="lives" id="livesDisplay">❤️ ❤️ ❤️</div>
            </div>
            <div class="timer-bar-container">
                <div class="timer-text" id="timerText">Tempo: 60s</div>
                <div class="timer-bar" id="timerBar"></div>
            </div>
            <div class="question-area">
                <div class="question" id="question">5 x 3 = ?</div>
                <div class="input-area">
                    <input type="number" id="answer" placeholder="?" autocomplete="off">
                    <button onclick="checkAnswer()">✅ Responder</button>
                </div>
            </div>
            <div class="ranking">
                <h3>🏅 Ranking Global</h3>
                <div id="rankingList">Carregando ranking...</div>
            </div>
        </div>

        <div id="gameOverScreen" class="hidden">
            <div class="game-over">
                <h2>💀 GAME OVER 💀</h2>
                <div class="stats" id="gameStats"></div>
                <button onclick="resetGame()">🔄 Jogar Novamente</button>
                <button onclick="logout()">🏠 Sair</button>
            </div>
        </div>
    </div>

    <script>
        // ✅ URL DO SEU APPS SCRIPT (TESTADA E FUNCIONANDO)
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxU7E-0CJdIEfeVHsT-Uzvd1fGKncXbOq6zFmpI4kS9Wu9Pd_fknlglS49Ieb7WVsW/exec';
        
        let currentPlayer = { codigo: '', turma: '' };
        let gameActive = false;
        let currentLevel = 1;
        let lives = 3;
        let score = 0;
        let totalQuestions = 0;
        let timeLeft = 60;
        let timerInterval = null;
        let currentAnswer = 0;
        let timePenalty = 0;
        
        const levelTimes = { 1: 60, 2: 30, 3: 20, 4: 15, 5: 10 };

        window.login = async function() {
            const turma = document.getElementById('turma').value;
            const codigo = document.getElementById('codigoAcesso').value.trim().toUpperCase();
            const errorDiv = document.getElementById('loginError');
            
            const regex = /^CA[A-Z0-9]{1,3}26\d{2}$/;
            
            if (!regex.test(codigo)) {
                errorDiv.textContent = '❌ Código inválido! Formato: CA + Turma + 26 + Número (ex: CA6A2601)';
                return;
            }
            
            currentPlayer = { codigo: codigo, turma: turma };
            errorDiv.textContent = '';
            startGame();
        };
        
        function startGame() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('codigoDisplay').textContent = currentPlayer.codigo;
            
            gameActive = true;
            currentLevel = 1;
            lives = 3;
            score = 0;
            totalQuestions = 0;
            timePenalty = 0;
            
            updateLivesDisplay();
            updateLevelDisplay();
            loadRanking();
            nextQuestion();
        }
        
        function nextQuestion() {
            if (!gameActive) return;
            if (timerInterval) clearInterval(timerInterval);
            
            const num1 = Math.floor(Math.random() * 11);
            const num2 = Math.floor(Math.random() * 11);
            currentAnswer = num1 * num2;
            document.getElementById('question').textContent = `${num1} x ${num2} = ?`;
            document.getElementById('answer').value = '';
            document.getElementById('answer').focus();
            
            timeLeft = levelTimes[currentLevel];
            document.getElementById('timerText').textContent = `Tempo: ${timeLeft}s`;
            updateTimerBar();
            
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                document.getElementById('timerText').textContent = `Tempo: ${timeLeft}s`;
                updateTimerBar();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    loseLife('⏰ Tempo esgotou!');
                }
            }, 1000);
        }
        
        window.checkAnswer = function() {
            if (!gameActive) return;
            
            const userAnswer = parseInt(document.getElementById('answer').value);
            const isCorrect = (userAnswer === currentAnswer);
            totalQuestions++;
            
            if (isCorrect) {
                showFeedback('✅ Correto!', '#4CAF50');
                let pointsEarned = 10 + Math.floor(timeLeft / 2);
                score += pointsEarned;
                clearInterval(timerInterval);
                nextQuestion();
            } else {
                showFeedback(`❌ Errado! Resposta: ${currentAnswer}`, '#f44336');
                loseLife('Resposta errada!');
            }
        };
        
        function showFeedback(message, color) {
            const feedback = document.createElement('div');
            feedback.textContent = message;
            feedback.style.position = 'fixed';
            feedback.style.top = '20%';
            feedback.style.left = '50%';
            feedback.style.transform = 'translateX(-50%)';
            feedback.style.backgroundColor = color;
            feedback.style.color = 'white';
            feedback.style.padding = '12px 24px';
            feedback.style.borderRadius = '50px';
            feedback.style.fontWeight = 'bold';
            feedback.style.zIndex = '1000';
            feedback.style.fontSize = '18px';
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 1500);
        }
        
        function loseLife(reason) {
            lives--;
            timePenalty++;
            updateLivesDisplay();
            if (lives <= 0) {
                gameOver();
            } else {
                clearInterval(timerInterval);
                nextQuestion();
            }
        }
        
        function updateLivesDisplay() {
            const livesContainer = document.getElementById('livesDisplay');
            let hearts = '';
            for (let i = 0; i < 3; i++) {
                hearts += i < lives ? '❤️ ' : '🖤 ';
            }
            livesContainer.textContent = hearts;
        }
        
        function updateLevelDisplay() {
            document.getElementById('levelDisplay').textContent = `Nível ${currentLevel} - ${levelTimes[currentLevel]}s`;
            if (totalQuestions > 0 && totalQuestions % 5 === 0 && currentLevel < 5) {
                currentLevel++;
                updateLevelDisplay();
                showFeedback(`⭐ AVANÇOU PARA NÍVEL ${currentLevel}! ⭐`, '#FF9800');
            }
        }
        
        function updateTimerBar() {
            const maxTime = levelTimes[currentLevel];
            const percentage = (timeLeft / maxTime) * 100;
            const timerBar = document.getElementById('timerBar');
            timerBar.style.width = `${Math.max(0, percentage)}%`;
            if (percentage < 30) {
                timerBar.classList.add('warning');
            } else {
                timerBar.classList.remove('warning');
            }
        }
        
        async function gameOver() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            const accuracy = totalQuestions > 0 ? (score / (totalQuestions * 10)) * 100 : 0;
            const speedBonus = Math.max(0, 100 - (timePenalty * 5));
            const efficiency = Math.min(100, Math.floor((accuracy * 0.6) + (speedBonus * 0.4)));
            
            await sendScoreToRanking(currentPlayer.codigo, currentPlayer.turma, currentLevel, efficiency);
            
            document.getElementById('gameStats').innerHTML = `
                <p>📊 <strong>Acertos:</strong> ${Math.floor(score/10)}/${totalQuestions}</p>
                <p>🏆 <strong>Nível Alcançado:</strong> ${currentLevel}</p>
                <p>⚡ <strong>Eficiência:</strong> ${efficiency}%</p>
                <p>💀 <strong>Vidas Restantes:</strong> ${lives}/3</p>
            `;
            
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            await loadRanking();
        }
        
        async function sendScoreToRanking(codigo, turma, nivel, eficiencia) {
            try {
                const response = await fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'save', 
                        codigo, 
                        turma, 
                        nivel, 
                        eficiencia, 
                        timestamp: new Date().toISOString() 
                    })
                });
                const result = await response.json();
                console.log('✅ Pontuação salva:', result);
            } catch (error) {
                console.error('Erro ao salvar:', error);
            }
        }
        
        async function loadRanking() {
            try {
                const url = `${APP_SCRIPT_URL}?action=get`;
                console.log('Buscando ranking de:', url);
                
                const response = await fetch(url);
                const text = await response.text();
                console.log('Resposta do servidor:', text);
                
                // Tenta parsear como JSON
                let data = [];
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    console.error('Erro ao parsear JSON:', e);
                    document.getElementById('rankingList').innerHTML = '<p>⚠️ Erro ao processar dados do ranking.</p>';
                    return;
                }
                
                if (!data || data.length === 0) {
                    document.getElementById('rankingList').innerHTML = '<p>🏅 Nenhum recorde ainda! Seja o primeiro!</p>';
                    return;
                }
                
                // Filtrar pela turma atual
                let turmaData = data.filter(item => item.turma === currentPlayer.turma);
                
                if (turmaData.length === 0) {
                    document.getElementById('rankingList').innerHTML = '<p>🏅 Nenhum recorde na sua turma ainda!</p>';
                    return;
                }
                
                turmaData.sort((a, b) => {
                    if (b.nivel !== a.nivel) return b.nivel - a.nivel;
                    return b.eficiencia - a.eficiencia;
                });
                
                let html = '<table class="ranking-table"><thead><tr><th>Pos</th><th>Código</th><th>Nível</th><th>Eficiência</th></tr></thead><tbody>';
                
                turmaData.slice(0, 10).forEach((item, index) => {
                    const isCurrent = item.codigo === currentPlayer.codigo;
                    html += `<tr style="${isCurrent ? 'background: #E3F2FD; font-weight: bold;' : ''}">
                        <td>${index + 1}${index === 0 ? ' 👑' : ''}</td>
                        <td>${item.codigo}${isCurrent ? ' (você)' : ''}</td>
                        <td>${item.nivel}/5</td>
                        <td>${item.eficiencia}%</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                document.getElementById('rankingList').innerHTML = html;
            } catch (error) {
                console.error('Erro detalhado ao carregar ranking:', error);
                document.getElementById('rankingList').innerHTML = '<p>⚠️ Erro ao carregar ranking. Tente novamente.</p>';
            }
        }
        
        window.resetGame = function() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('codigoAcesso').value = '';
        };
        
        window.logout = function() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('codigoAcesso').value = '';
            if (timerInterval) clearInterval(timerInterval);
        };
        
        // Atualizar ranking a cada 15 segundos
        setInterval(() => {
            if (gameActive && currentPlayer.turma) {
                loadRanking();
            }
        }, 15000);
        
        loadRanking();
    </script>
</body>
</html>
