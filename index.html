<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Desafio da Tabuada - TOP 10</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;}
        .container{max-width:1000px;margin:0 auto;background:white;border-radius:30px;overflow:hidden;}
        .header{background:linear-gradient(135deg,#5f27cd,#341f97);padding:20px;color:white;text-align:center;}
        .rankings{display:flex;gap:15px;padding:20px;background:#f0f0f0;flex-wrap:wrap;}
        .ranking{flex:1;min-width:250px;background:white;border-radius:15px;overflow:hidden;}
        .ranking h3{background:#667eea;color:white;padding:12px;text-align:center;font-size:14px;}
        .ranking-content{max-height:300px;overflow-y:auto;padding:10px;}
        table{width:100%;border-collapse:collapse;font-size:12px;}
        th,td{padding:8px 5px;text-align:left;border-bottom:1px solid #ddd;}
        th{background:#f5f5f5;}
        .login-area{padding:20px;}
        input,select{width:100%;padding:12px;margin:10px 0;border:2px solid #ddd;border-radius:10px;}
        button{width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;}
        button:hover{opacity:0.9;}
        .hidden{display:none;}
        .feedback{position:fixed;top:30%;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:50px;color:white;z-index:1000;}
        .lives{font-size:28px;margin:10px 0;}
        .question{font-size:40px;font-weight:bold;margin:20px 0;}
        .first-place{background:#ffd700;font-weight:bold;}
        .badge-turma{background:#FF9800;color:white;padding:2px 6px;border-radius:12px;font-size:10px;}
        @media (max-width:700px){.rankings{flex-direction:column;}}
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen">
        <div class="header"><h2>🏆 DESAFIO DA TABUADA</h2><p>⚡ TOP 10 DA SALA E DA ESCOLA ⚡</p></div>
        
        <div class="rankings">
            <div class="ranking"><h3>🏅 TOP 10 DA SALA</h3><div class="ranking-content" id="rankingSala">Carregando...</div></div>
            <div class="ranking"><h3>🌍 TOP 10 DA ESCOLA</h3><div class="ranking-content" id="rankingEscola">Carregando...</div></div>
        </div>
        
        <div class="login-area">
            <select id="turma">
                <option>6º Ano A</option><option>6º Ano B</option><option>7º Ano A</option>
                <option>7º Ano B</option><option>8º Ano A</option><option>8º Ano B</option>
                <option>9º Ano A</option><option>9º Ano B</option>
            </select>
            <input type="text" id="codigo" placeholder="Código (ex: CA6A2601)" maxlength="10">
            <div id="loginError" style="color:red;font-size:13px;"></div>
            <button onclick="login()">🎮 ENTRAR E JOGAR</button>
        </div>
    </div>

    <div id="gameScreen" class="hidden">
        <div class="header">
            <div style="display:flex;justify-content:space-between"><span id="nivel">Nível 1</span><span id="codigoDisplay"></span></div>
            <div class="lives" id="lives">❤️ ❤️ ❤️</div>
        </div>
        <div style="padding:20px;text-align:center">
            <div class="question" id="question">5 x 3 = ?</div>
            <input type="number" id="answer" placeholder="Resposta" style="width:160px;padding:15px;margin:10px;font-size:18px;text-align:center;">
            <button onclick="checkAnswer()">✅ RESPONDER</button>
        </div>
        <div class="rankings">
            <div class="ranking"><h3>🏅 TOP 10 MINHA SALA</h3><div class="ranking-content" id="gameRankingSala">Carregando...</div></div>
            <div class="ranking"><h3>🌍 TOP 10 ESCOLA</h3><div class="ranking-content" id="gameRankingEscola">Carregando...</div></div>
        </div>
    </div>

    <div id="gameOverScreen" class="hidden">
        <div class="header"><h2>💀 GAME OVER 💀</h2></div>
        <div class="stats" id="stats" style="padding:20px;text-align:center;"></div>
        <div style="padding:20px;display:flex;gap:10px">
            <button onclick="resetGame()" style="flex:1">🔄 JOGAR NOVAMENTE</button>
            <button onclick="logout()" style="flex:1">🏠 SAIR</button>
        </div>
    </div>
</div>

<script>
// 🔴 COLOQUE A URL QUE VOCÊ COPIOU DO APPS SCRIPT AQUI 🔴
const URL_API = 'https://script.google.com/macros/s/AKfycbyIOxIeUq5zQEQjWcidbt4NYxGR7VKsNpX2PBh4Kcx2RT7dxPoqFDH__bupGYWJdFwz/exec';

let jogador = {}, ativo = false, nivel = 1, vidas = 3, acertos = 0, total = 0;
let tempo = 60, timerId = null, respostaAtual = 0, temposRespostas = [], inicioPergunta = 0;
const temposNivel = {1:60,2:30,3:20,4:15,5:10};

async function carregarRankings() {
    try {
        const resposta = await fetch(`${URL_API}?acao=get`);
        const dados = await resposta.json();
        
        if (dados && dados.length) {
            const turmaSelecionada = document.getElementById('turma')?.value || '6º Ano A';
            const dadosSala = dados.filter(r => r.turma === turmaSelecionada);
            exibirRankingSala(dadosSala);
            exibirRankingEscola(dados);
        } else {
            document.getElementById('rankingSala').innerHTML = '<p style="text-align:center">🏅 Nenhuma pontuação ainda! Seja o primeiro!</p>';
            document.getElementById('rankingEscola').innerHTML = '<p style="text-align:center">🌍 Nenhuma pontuação global!</p>';
        }
    } catch(e) {
        document.getElementById('rankingSala').innerHTML = '<p style="text-align:center">⚠️ Erro de conexão. Verifique a URL do Apps Script.</p>';
        document.getElementById('rankingEscola').innerHTML = '<p style="text-align:center">⚠️ URL deve terminar com /exec</p>';
    }
}

function exibirRankingSala(dados) {
    const div = document.getElementById('rankingSala');
    if (!dados.length) { div.innerHTML = '<p>🏅 Nenhuma pontuação nesta sala</p>'; return; }
    dados.sort((a,b)=>b.eficiencia - a.eficiencia);
    let html = '</table><thead><tr><th>🏆</th><th>Código</th><th>Nível</th><th>%</th></tr></thead><tbody>';
    dados.slice(0,10).forEach((item,i)=>{
        let medalha = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`;
        html += `<tr class="${i===0?'first-place':''}"><td>${medalha}</td><td>${item.codigo}</td><td>${item.nivel}/5<td style="color:${item.eficiencia>=80?'green':'orange'}">${item.eficiencia}%</td></table>`;
    });
    div.innerHTML = html;
}

function exibirRankingEscola(dados) {
    const div = document.getElementById('rankingEscola');
    if (!dados.length) { div.innerHTML = '<p>🌍 Nenhuma pontuação</p>'; return; }
    dados.sort((a,b)=>b.eficiencia - a.eficiencia);
    let html = '<table><thead><tr><th>🏆</th><th>Código</th><th>Sala</th><th>Nível</th><th>%</th></tr></thead><tbody>';
    dados.slice(0,10).forEach((item,i)=>{
        let medalha = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`;
        html += `<tr class="${i===0?'first-place':''}"><td>${medalha}</td><td>${item.codigo}<td><span class="badge-turma">${item.turma}</span></td><td>${item.nivel}/5<td style="color:${item.eficiencia>=80?'green':'orange'}">${item.eficiencia}%</td></tr>`;
    });
    div.innerHTML = html;
}

async function carregarRankingsJogo() {
    try {
        const resposta = await fetch(`${URL_API}?acao=get`);
        const dados = await resposta.json();
        if(dados && dados.length) {
            exibirRankingSalaJogo(dados.filter(r=>r.turma===jogador.turma));
            exibirRankingEscolaJogo(dados);
        }
    } catch(e) { console.error(e); }
}

function exibirRankingSalaJogo(dados) {
    const div = document.getElementById('gameRankingSala');
    if(!dados.length){ div.innerHTML='<p>🏅 Nenhuma pontuação</p>'; return; }
    dados.sort((a,b)=>b.eficiencia-a.eficiencia);
    let html = '<table><thead><tr><th>🏆</th><th>Código</th><th>Nível</th><th>%</th></tr></thead><tbody>';
    dados.slice(0,10).forEach((item,i)=>{
        const souEu = item.codigo === jogador.codigo;
        let medalha = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`;
        html += `<tr style="${souEu?'background:#E3F2FD;font-weight:bold':''}"><td>${medalha}</td><td>${item.codigo}${souEu?'📍':''}</td><td>${item.nivel}/5<td>${item.eficiencia}%</td></tr>`;
    });
    div.innerHTML = html;
}

function exibirRankingEscolaJogo(dados) {
    const div = document.getElementById('gameRankingEscola');
    if(!dados.length){ div.innerHTML='<p>🌍 Nenhuma pontuação</p>'; return; }
    dados.sort((a,b)=>b.eficiencia-a.eficiencia);
    let html = '<table><thead><tr><th>🏆</th><th>Código</th><th>Sala</th><th>Nível</th><th>%</th></tr></thead><tbody>';
    dados.slice(0,10).forEach((item,i)=>{
        const souEu = item.codigo === jogador.codigo;
        let medalha = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`;
        html += `<tr style="${souEu?'background:#E3F2FD;font-weight:bold':''}"><td>${medalha}</td><td>${item.codigo}${souEu?'📍':''}<td><span class="badge-turma">${item.turma}</span></td><td>${item.nivel}/5<td>${item.eficiencia}%</td></tr>`;
    });
    div.innerHTML = html;
}

async function salvarPontuacao(codigo,turma,nivel,eficiencia) {
    try {
        await fetch(URL_API, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({codigo,turma,nivel,eficiencia})
        });
    } catch(e) { console.error(e); }
}

window.login = function() {
    const turma = document.getElementById('turma').value;
    const codigo = document.getElementById('codigo').value.trim().toUpperCase();
    if (!/^CA[A-Z0-9]{1,3}26\d{2}$/.test(codigo)) {
        document.getElementById('loginError').innerText = '❌ Código inválido! Ex: CA6A2601';
        return;
    }
    jogador = {codigo, turma};
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('codigoDisplay').innerText = codigo;
    ativo = true; nivel = 1; vidas = 3; acertos = 0; total = 0; temposRespostas = [];
    atualizarVidas(); atualizarNivel();
    carregarRankingsJogo();
    proximaPergunta();
};

function proximaPergunta() {
    if(!ativo) return;
    if(timerId) clearInterval(timerId);
    let n1=Math.floor(Math.random()*11), n2=Math.floor(Math.random()*11);
    respostaAtual=n1*n2;
    document.getElementById('question').innerHTML=`${n1} x ${n2} = ?`;
    document.getElementById('answer').value='';
    document.getElementById('answer').focus();
    tempo=temposNivel[nivel];
    inicioPergunta=Date.now();
    timerId=setInterval(()=>{
        if(!ativo) return;
        tempo--;
        if(tempo<=0){ clearInterval(timerId); perderVida('⏰ Tempo!'); }
    },1000);
}

window.checkAnswer=function(){
    if(!ativo) return;
    let resp=parseInt(document.getElementById('answer').value);
    total++;
    if(resp===respostaAtual){
        temposRespostas.push((Date.now()-inicioPergunta)/1000);
        acertos++;
        clearInterval(timerId);
        if(total%5===0 && nivel<5){ nivel++; atualizarNivel(); }
        proximaPergunta();
    } else { perderVida('Errou!'); }
};

function perderVida(m){ vidas--; atualizarVidas(); if(vidas<=0) gameOver(); else { clearInterval(timerId); proximaPergunta(); } }
function atualizarVidas(){ let h=''; for(let i=0;i<3;i++) h+=i<vidas?'❤️ ':'🖤 '; document.getElementById('lives').innerHTML=h; }
function atualizarNivel(){ document.getElementById('nivel').innerHTML=`Nível ${nivel} - ${temposNivel[nivel]}s`; }

function calcularEficiencia(){
    let taxa = total>0 ? (acertos/total)*60 : 0;
    let bonus=0;
    if(temposRespostas.length>0){
        let media = temposRespostas.reduce((a,b)=>a+b,0)/temposRespostas.length;
        let proporcao = Math.max(0, Math.min(1, (temposNivel[nivel]-media)/temposNivel[nivel]));
        bonus = proporcao*40;
    }
    return Math.min(100, Math.floor(taxa+bonus));
}

async function gameOver(){
    ativo=false; if(timerId) clearInterval(timerId);
    let eficiencia = calcularEficiencia();
    await salvarPontuacao(jogador.codigo, jogador.turma, nivel, eficiencia);
    let tempoMedio = temposRespostas.length>0 ? (temposRespostas.reduce((a,b)=>a+b,0)/temposRespostas.length).toFixed(1) : 'N/A';
    document.getElementById('stats').innerHTML = `<p>📊 Acertos: ${acertos}/${total}</p><p>🏆 Nível: ${nivel}/5</p><p>⚡ Eficiência: <span style="font-size:28px;color:${eficiencia>=80?'green':'orange'}">${eficiencia}%</span></p><p>⏱️ Tempo médio: ${tempoMedio}s</p><p>💀 Vidas: ${vidas}/3</p><hr><p>✅ Pontuação salva!</p>`;
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.remove('hidden');
    await carregarRankings();
}

function resetGame(){ document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); if(timerId) clearInterval(timerId); carregarRankings(); }
function logout(){ resetGame(); }

document.addEventListener('keypress', (e) => { if(e.key==='Enter' && !document.getElementById('gameScreen').classList.contains('hidden')) checkAnswer(); });
document.getElementById('turma').addEventListener('change', () => carregarRankings());

carregarRankings();
</script>
</body>
</html>
